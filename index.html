<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>360 Neo Chat</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
:root{--bg:#0c0f18;--sur:#13172a;--sur2:#1a1f35;--bor:#252d4a;--acc:#4f8ef7;--acc2:#00d4aa;--txt:#e8edf5;--mut:#5a6480;--lab:#8b95b0;--ai:#161c30;--us:#1a3a6e;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:transparent;overflow:hidden;}

/* ── Floating Button ── */
.fab{
  position:fixed;bottom:24px;right:24px;
  background:linear-gradient(135deg,var(--acc),var(--acc2));
  border:none;border-radius:30px;
  padding:13px 20px;
  display:flex;align-items:center;gap:9px;
  cursor:pointer;
  box-shadow:0 4px 24px rgba(79,142,247,0.45);
  transition:transform .2s, box-shadow .2s;
  z-index:999;
}
.fab:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(79,142,247,0.55);}
.fab-icon{width:22px;height:22px;fill:#fff;flex-shrink:0;}
.fab-txt{font-size:14px;font-weight:600;color:#fff;white-space:nowrap;}
.fab-dot{
  position:absolute;top:-3px;right:-3px;
  width:12px;height:12px;
  background:#22c55e;border-radius:50%;
  border:2px solid white;
  animation:pulse 2s infinite;
}
@keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.3);opacity:.7}}

/* ── Chat Panel ── */
.panel{
  position:fixed;bottom:90px;right:24px;
  width:370px;height:560px;
  background:var(--bg);
  border-radius:16px;
  box-shadow:0 12px 48px rgba(0,0,0,0.6);
  display:flex;flex-direction:column;
  overflow:hidden;
  transform:scale(0.85) translateY(20px);
  opacity:0;
  pointer-events:none;
  transition:transform .25s cubic-bezier(.34,1.56,.64,1), opacity .2s;
  z-index:998;
}
.panel.open{
  transform:scale(1) translateY(0);
  opacity:1;
  pointer-events:all;
}

/* Mobile */
@media(max-width:480px){
  .panel{
    bottom:0;right:0;left:0;
    width:100%;height:100vh;
    border-radius:0;
  }
  .fab{bottom:16px;right:16px;}
}

/* ── Top Bar ── */
.top{background:var(--sur);border-bottom:1px solid var(--bor);padding:11px 14px;display:flex;align-items:center;gap:10px;flex-shrink:0;}
.av{width:34px;height:34px;background:linear-gradient(135deg,var(--acc),var(--acc2));border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#fff;flex-shrink:0;position:relative;}
.av::after{content:'';position:absolute;bottom:1px;right:1px;width:8px;height:8px;background:#22c55e;border-radius:50%;border:2px solid var(--sur);}
.bn{font-size:13px;font-weight:600;color:var(--txt);}
.br{font-size:10px;color:var(--mut);}
.pw{margin-left:auto;font-size:9px;color:var(--mut);}.pw b{color:var(--acc2);}
.close-btn{background:none;border:none;cursor:pointer;padding:4px;color:var(--mut);font-size:18px;line-height:1;margin-left:6px;}
.close-btn:hover{color:var(--txt);}

/* ── Chat ── */
.chat{flex:1;overflow-y:auto;padding:14px 12px;display:flex;flex-direction:column;gap:10px;scroll-behavior:smooth;}
.chat::-webkit-scrollbar{width:3px;}.chat::-webkit-scrollbar-thumb{background:var(--bor);border-radius:2px;}
.msg{display:flex;gap:7px;align-items:flex-end;animation:fu .2s ease;}
@keyframes fu{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.msg.u{flex-direction:row-reverse;}
.av2{width:24px;height:24px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;}
.msg.ai .av2{background:linear-gradient(135deg,var(--acc),var(--acc2));color:#fff;}
.msg.u .av2{background:var(--bor);color:var(--lab);}
.bbl{max-width:82%;padding:8px 12px;border-radius:13px;font-size:12.5px;line-height:1.6;}
.msg.ai .bbl{background:var(--ai);border:1px solid var(--bor);border-bottom-left-radius:3px;color:var(--txt);}
.msg.u .bbl{background:var(--us);border-bottom-right-radius:3px;color:#c8dcff;}
.typ{display:flex;gap:4px;align-items:center;padding:9px 12px;background:var(--ai);border:1px solid var(--bor);border-radius:13px;border-bottom-left-radius:3px;}
.dt{width:5px;height:5px;background:var(--mut);border-radius:50%;animation:b 1.2s infinite;}
.dt:nth-child(2){animation-delay:.2s}.dt:nth-child(3){animation-delay:.4s}
@keyframes b{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-4px);opacity:1}}
.chips{display:flex;flex-wrap:wrap;gap:5px;padding:2px 0 2px 31px;}
.chip{background:var(--sur2);border:1px solid var(--bor);border-radius:14px;padding:4px 11px;font-size:11.5px;color:var(--lab);cursor:pointer;transition:all .13s;white-space:nowrap;}
.chip:hover{border-color:var(--acc);color:var(--acc);background:rgba(79,142,247,.08);}

/* Recommendation */
.rec{background:linear-gradient(135deg,var(--sur2),#0f1628);border:1px solid var(--acc);border-radius:11px;padding:13px;max-width:85%;}
.rec-b{display:inline-flex;align-items:center;background:rgba(79,142,247,.12);border:1px solid rgba(79,142,247,.25);border-radius:14px;padding:2px 9px;font-size:9px;font-weight:700;color:var(--acc);text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px;}
.rec-t{font-size:14px;font-weight:700;margin-bottom:3px;color:var(--txt);}
.rec-d{font-size:11px;color:var(--lab);line-height:1.6;margin-bottom:10px;}
.rec-s{display:flex;flex-direction:column;gap:4px;margin-bottom:10px;}
.rec-si{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--txt);}
.rec-si::before{content:'✓';width:14px;height:14px;background:rgba(0,212,170,.12);border:1px solid rgba(0,212,170,.3);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;color:var(--acc2);flex-shrink:0;}
.rec-p{font-size:10px;color:var(--mut);border-top:1px solid var(--bor);padding-top:7px;margin-bottom:10px;}
.rec-p strong{color:var(--acc2);font-size:12px;}
.btn-c{width:100%;background:linear-gradient(135deg,var(--acc),var(--acc2));border:none;border-radius:7px;padding:9px;font-size:12px;font-weight:600;color:#fff;cursor:pointer;}

/* Form */
.frm{background:var(--sur2);border:1px solid var(--bor);border-radius:11px;padding:13px;max-width:85%;display:flex;flex-direction:column;gap:7px;}
.frm-t{font-size:12px;font-weight:600;color:var(--txt);margin-bottom:2px;}
.frm input,.frm select{background:var(--bg);border:1px solid var(--bor);border-radius:6px;padding:7px 10px;font-size:12px;color:var(--txt);font-family:'Inter',sans-serif;outline:none;width:100%;}
.frm input:focus,.frm select:focus{border-color:var(--acc);}
.frm input::placeholder{color:var(--mut);}
.frm select option{background:var(--sur2);}
.btn-s{background:linear-gradient(135deg,var(--acc),var(--acc2));border:none;border-radius:6px;padding:9px;font-size:12px;font-weight:600;color:#fff;cursor:pointer;}
.frm-n{font-size:9px;color:var(--mut);text-align:center;}

/* Input */
.inp-row{flex-shrink:0;background:var(--sur);border-top:1px solid var(--bor);padding:9px 12px;display:flex;gap:7px;align-items:center;}
.inp-row textarea{flex:1;background:var(--sur2);border:1px solid var(--bor);border-radius:8px;padding:7px 11px;font-size:12.5px;color:var(--txt);font-family:'Inter',sans-serif;resize:none;outline:none;max-height:80px;line-height:1.5;}
.inp-row textarea:focus{border-color:var(--acc);}
.inp-row textarea::placeholder{color:var(--mut);}
.btn-send{width:32px;height:32px;background:linear-gradient(135deg,var(--acc),var(--acc2));border:none;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.btn-send svg{width:13px;height:13px;fill:#fff;}
</style>
</head>
<body>

<!-- Floating Button -->
<button class="fab" id="fab" onclick="toggleChat()">
  <div class="fab-dot"></div>
  <svg class="fab-icon" viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-2 12H6v-2h12v2zm0-3H6V9h12v2zm0-3H6V6h12v2z"/></svg>
  <span class="fab-txt">Μίλησε με τον Neo</span>
</button>

<!-- Chat Panel -->
<div class="panel" id="panel">
  <div class="top">
    <div class="av">N</div>
    <div>
      <div class="bn">Neo · 360 Ergometric Tests</div>
      <div class="br">Σύμβουλος Αθλητικής Επιστήμης</div>
    </div>
    <div class="pw">Powered by <b>AI</b></div>
    <button class="close-btn" onclick="toggleChat()">✕</button>
  </div>
  <div class="chat" id="chat"></div>
  <div class="inp-row">
    <textarea id="inp" placeholder="Γράψε μήνυμα..." rows="1"
      onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send()}"
      oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"></textarea>
    <button class="btn-send" onclick="send()">
      <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<script>
var API = "https://neo360worker.neoph-ioannou.workers.dev";
var SESSION_ID = 'sid_' + Date.now() + '_' + Math.random().toString(36).substr(2,9);
var isBusy = false;
var chatOpened = false;

function toggleChat() {
  var panel = document.getElementById("panel");
  var fab = document.getElementById("fab");
  panel.classList.toggle("open");

  // Κρύψε/εμφάνισε το κουμπί όταν ανοίγει/κλείνει το chat
  if (panel.classList.contains("open")) {
    fab.style.display = "none";
  } else {
    fab.style.display = "flex";
  }

  // Άνοιξε για πρώτη φορά — στείλε welcome message
  if (panel.classList.contains("open") && !chatOpened) {
    chatOpened = true;
    setTimeout(function() {
      showTyping(function() {
        addAI("Γεια σου! 👋 Είμαι ο Neo, σύμβουλος του 360 Ergometric Tests.\n\nΠες μου λίγα λόγια για σένα — είσαι αθλητής, ενδιαφέρεσαι για κάποιο τεστ προσωπικά, ή εκπροσωπείς μια ομάδα ή σύλλογο;");
        addChips(["Είμαι αθλητής", "Ενδιαφέρομαι ως ιδιώτης", "Εκπροσωπώ σύλλογο / ακαδημία", "Είμαι γονιός αθλητή"]);
      });
    }, 300);
  }
}

function send(txt) {
  if (isBusy) return;
  var inp = document.getElementById("inp");
  var msg = (txt || inp.value).trim();
  if (!msg) return;
  inp.value = ""; inp.style.height = "auto";
  removeChips();
  addUser(msg);
  isBusy = true;

  showTyping(function() {
    fetch(API, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ type: "chat", sessionId: SESSION_ID, message: msg })
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      removeTyping();
      isBusy = false;
      if (!data.success) {
        addAI("Συγγνώμη, προέκυψε τεχνικό πρόβλημα. Παρακαλώ επικοινώνησε στο **+357 99341202**.");
        return;
      }
      var full = data.reply;

      // Εντόπισε και επεξεργάσου CONTACT_JSON
      var contactMatch = full.match(/CONTACT_JSON:(\{[\s\S]+?\})/m);
      if (contactMatch) {
        try {
          var contact = JSON.parse(contactMatch[1]);
          sendToBigin(contact.name, contact.phone, contact.email);
        } catch(e) {}
      }

      // Κρύψε CONTACT_JSON από τον χρήστη
      var cleanReply = full.replace(/CONTACT_JSON:\{[\s\S]*?\}/m, "").trim();

      var match = cleanReply.match(/RECOMMENDATION_JSON:(\{[\s\S]+?\})\s*$/m);
      if (match) {
        var t = cleanReply.replace(/RECOMMENDATION_JSON:[\s\S]+$/, "").trim();
        if (t) addAI(t);
        try { showRec(JSON.parse(match[1])); } catch(e) { addAI(cleanReply); }
      } else {
        addAI(cleanReply);
      }
    })
    .catch(function() {
      removeTyping();
      isBusy = false;
      addAI("Δεν μπόρεσα να συνδεθώ. Παρακαλώ επικοινώνησε στο **+357 99341202**.");
    });
  });
}

function addUser(text) {
  var c = document.getElementById("chat");
  var el = document.createElement("div");
  el.className = "msg u";
  el.innerHTML = '<div class="av2">Εσύ</div><div class="bbl">' + esc(text) + '</div>';
  c.appendChild(el); scroll();
}

function addAI(text) {
  var c = document.getElementById("chat");
  var el = document.createElement("div");
  el.className = "msg ai";
  el.innerHTML = '<div class="av2">N</div><div class="bbl">' + fmt(text) + '</div>';
  c.appendChild(el); scroll();
}

function showTyping(cb) {
  var c = document.getElementById("chat");
  var el = document.createElement("div");
  el.className = "msg ai"; el.id = "typ";
  el.innerHTML = '<div class="av2">N</div><div class="typ"><div class="dt"></div><div class="dt"></div><div class="dt"></div></div>';
  c.appendChild(el); scroll();
  setTimeout(cb, 400);
}

function removeTyping() {
  var t = document.getElementById("typ"); if (t) t.remove();
}

function addChips(opts) {
  removeChips();
  var c = document.getElementById("chat");
  var w = document.createElement("div");
  w.className = "chips"; w.id = "chips";
  opts.forEach(function(o) {
    var chip = document.createElement("div");
    chip.className = "chip"; chip.textContent = o;
    chip.onclick = function() { send(o); };
    w.appendChild(chip);
  });
  c.appendChild(w); scroll();
}

function removeChips() {
  var ch = document.getElementById("chips"); if (ch) ch.remove();
}

function showRec(rec) {
  var c = document.getElementById("chat");
  var el = document.createElement("div");
  el.className = "msg ai";
  var svcs = (rec.services||[]).map(function(s){ return '<div class="rec-si">'+esc(s)+'</div>'; }).join("");
  var pkgS = esc(rec.package||"").replace(/'/g,"\\'");
  el.innerHTML =
    '<div class="av2">N</div><div class="rec">' +
    '<div class="rec-b">⭐ Προτεινόμενο Πακέτο</div>' +
    '<div class="rec-t">'+esc(rec.package)+'</div>' +
    '<div class="rec-d">'+esc(rec.description)+'</div>' +
    '<div class="rec-s">'+svcs+'</div>' +
    '<div class="rec-p">Ενδεικτική τιμή: <strong>'+esc(rec.price)+'</strong></div>' +
    '<a href="'+(rec.bookingUrl||"https://www.ergometrictests.com/book-online")+'" target="_blank" class="btn-c" style="display:block;text-align:center;text-decoration:none;margin-bottom:8px;color:#fff;">📅 '+esc(rec.cta||"Κλείσε Online Ραντεβού")+'</a>' +
    (rec.infoUrl ? '<a href="'+rec.infoUrl+'" target="_blank" style="display:block;text-align:center;font-size:11px;color:var(--acc2);margin-bottom:8px;text-decoration:none;">🔍 Περισσότερες πληροφορίες</a>' : '') +
    '<button onclick="showForm(\''+pkgS+'\','  +(!!(rec.isB2B))+ ')" style="width:100%;background:var(--sur2);color:var(--lab);border:1px solid var(--bor);border-radius:7px;padding:7px;font-size:11px;cursor:pointer;">📞 Αφήσε τα στοιχεία σου</button>' +
    '</div>';
  c.appendChild(el);
  setTimeout(function(){
    addAI("Θέλεις να σου εξηγήσω περισσότερα; Ή κλείνουμε άμεσα ραντεβού; 😊");
    addChips(["Πες μου περισσότερα","Κλείσε ραντεβού","Τι κοστίζει ακριβώς;","Πού βρίσκεστε;"]);
  },300);
  scroll();
}

function showForm(pkg, isB2B) {
  removeChips();
  setTimeout(function(){ addAI("Τέλεια! Άφησέ μου τα στοιχεία σου και θα επικοινωνήσω μαζί σου εντός της ίδιας μέρας. 📞"); },150);
  setTimeout(function(){
    var c = document.getElementById("chat");
    var el = document.createElement("div");
    el.className = "msg ai";
    var b2b = isB2B ?
      '<input type="text" id="cf-club" placeholder="Όνομα Συλλόγου / Ακαδημίας">'+
      '<input type="number" id="cf-players" placeholder="Αριθμός αθλητών" min="1">' : "";
    el.innerHTML =
      '<div class="av2">N</div><div class="frm">' +
      '<div class="frm-t">📋 Στοιχεία Επικοινωνίας</div>' +
      '<input type="text" id="cf-name" placeholder="Ονοματεπώνυμο *">' +
      '<input type="tel" id="cf-phone" placeholder="Τηλέφωνο *">' +
      '<input type="email" id="cf-email" placeholder="Email">' +
      b2b +
      '<select id="cf-time"><option value="">Προτιμώμενη ώρα επικοινωνίας</option>' +
      '<option>Πρωί (9:00–12:00)</option><option>Μεσημέρι (12:00–15:00)</option><option>Απόγευμα (15:00–18:00)</option></select>' +
      '<input type="hidden" id="cf-pkg" value="'+esc(pkg)+'">' +
      '<button class="btn-s" onclick="submitForm('+isB2B+')">Αποστολή →</button>' +
      '<div class="frm-n">🔒 Τα στοιχεία σου είναι ασφαλή</div></div>';
    c.appendChild(el); scroll();
  },1000);
}

function submitForm(isB2B) {
  var name    = ((document.getElementById("cf-name")||{}).value||"").trim();
  var phone   = ((document.getElementById("cf-phone")||{}).value||"").trim();
  var email   = (document.getElementById("cf-email")||{}).value||"";
  var pkg     = (document.getElementById("cf-pkg")||{}).value||"";
  var time    = (document.getElementById("cf-time")||{}).value||"";
  var club    = ((document.getElementById("cf-club")||{}).value||"").trim();
  var players = (document.getElementById("cf-players")||{}).value||"";

  if (!name||!phone){ alert("Παρακαλώ συμπλήρωσε τουλάχιστον το όνομα και το τηλέφωνό σου."); return; }

  // Στείλε στο Zoho Bigin μέσω Web Form
  var biginForm = document.createElement('form');
  biginForm.method = 'POST';
  biginForm.action = 'https://bigin.zoho.eu/crm/WebToContactForm';
  biginForm.target = 'hidden_bigin_frame';
  biginForm.style.display = 'none';
  biginForm.acceptCharset = 'UTF-8';

  var nameParts = name.trim().split(' ');
  var firstName = nameParts.length > 1 ? nameParts.slice(0, -1).join(' ') : '';
  var lastName = nameParts.length > 1 ? nameParts[nameParts.length - 1] : name;

  var biginFields = {
    'xnQsjsdp': 'f3f327c42d69f8b757562325a7c66edc88917a78b2be9b98458cb46831fbc718',
    'xmIwtLD':  '1f3ca4bca3727109e54b38833c8e817d313c69aaefca8d2277ccf1a8c1c1a9ec6df31d29e925c69f115f92dbc0ea1fe1',
    'actionType': 'Q29udGFjdHM=',
    'rmsg': 'true',
    'returnURL': 'null',
    'First Name': firstName,
    'Last Name': lastName,
    'Mobile': phone,
    'Email': email
  };

  Object.keys(biginFields).forEach(function(key) {
    var input = document.createElement('input');
    input.type = 'hidden';
    input.name = key;
    input.value = biginFields[key];
    biginForm.appendChild(input);
  });

  // Δημιούργησε hidden iframe για το submit
  var biginFrame = document.getElementById('hidden_bigin_frame');
  if (!biginFrame) {
    biginFrame = document.createElement('iframe');
    biginFrame.name = 'hidden_bigin_frame';
    biginFrame.id = 'hidden_bigin_frame';
    biginFrame.style.display = 'none';
    document.body.appendChild(biginFrame);
  }

  document.body.appendChild(biginForm);
  biginForm.submit();
  setTimeout(function(){ document.body.removeChild(biginForm); }, 2000);

  document.querySelectorAll(".frm").forEach(function(f){ var p=f.closest(".msg"); if(p) p.remove(); });
  addAI("Τέλεια "+name.split(" ")[0]+"! ✅ Έλαβα τα στοιχεία σου.\n\nΘα επικοινωνήσω μαζί σου "+(time?time.toLowerCase():"σύντομα")+".\n\nΑν θέλεις να μιλήσεις άμεσα: **+357 99341202** 💪");
  scroll();
}

// Στείλε στο Zoho Bigin απευθείας από client
function sendToBigin(name, phone, email) {
  try {
    var nameParts = (name || "").trim().split(" ");
    var firstName = nameParts.length > 1 ? nameParts.slice(0, -1).join(" ") : "";
    var lastName  = nameParts.length > 1 ? nameParts[nameParts.length - 1] : (name || "Lead");

    var form = document.createElement("form");
    form.method = "POST";
    form.action = "https://bigin.zoho.eu/crm/WebToContactForm";
    form.target = "bigin_iframe";
    form.style.display = "none";
    form.acceptCharset = "UTF-8";

    var fields = {
      "xnQsjsdp": "416656b115dbf943a669983764d1b142cb347d6df1d56686fbeda4d34a5b34a4",
      "xmIwtLD":  "8dabf1cb6dc5302c9cb31aeed0570cfc3688ad0f418a677c259be7cb06e659122fb63a9a531eb6539546ffa16869850e",
      "actionType": "Q29udGFjdHM=",
      "rmsg": "true",
      "returnURL": "null",
      "First Name": firstName,
      "Last Name": lastName,
      "Mobile": phone || "",
      "Email": email || ""
    };

    Object.keys(fields).forEach(function(key) {
      var input = document.createElement("input");
      input.type = "hidden";
      input.name = key;
      input.value = fields[key];
      form.appendChild(input);
    });

    var iframe = document.getElementById("bigin_iframe");
    if (!iframe) {
      iframe = document.createElement("iframe");
      iframe.name = "bigin_iframe";
      iframe.id = "bigin_iframe";
      iframe.style.display = "none";
      document.body.appendChild(iframe);
    }

    document.body.appendChild(form);
    form.submit();
    setTimeout(function(){ if(form.parentNode) form.parentNode.removeChild(form); }, 3000);
  } catch(e) {
    console.error("Bigin error:", e);
  }
}

function esc(s){ return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function fmt(t){ return esc(t).replace(/\*\*(.+?)\*\*/g,"<strong>$1</strong>").replace(/\n/g,"<br>"); }
function scroll(){ var c=document.getElementById("chat"); setTimeout(function(){ c.scrollTop=c.scrollHeight; },40); }
</script>
