<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>360 Ergometric — Σύμβουλος</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
:root{--bg:#0c0f18;--sur:#13172a;--sur2:#1a1f35;--bor:#252d4a;--acc:#4f8ef7;--acc2:#00d4aa;--txt:#e8edf5;--mut:#5a6480;--lab:#8b95b0;--ai:#161c30;--us:#1a3a6e;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--txt);height:100vh;display:flex;flex-direction:column;overflow:hidden;}
.top{background:var(--sur);border-bottom:1px solid var(--bor);padding:11px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0;}
.av{width:35px;height:35px;background:linear-gradient(135deg,var(--acc),var(--acc2));border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#fff;flex-shrink:0;position:relative;}
.av::after{content:'';position:absolute;bottom:1px;right:1px;width:8px;height:8px;background:var(--acc2);border-radius:50%;border:2px solid var(--sur);}
.bn{font-size:13px;font-weight:600;}.br{font-size:11px;color:var(--mut);}
.pw{margin-left:auto;font-size:10px;color:var(--mut);}.pw b{color:var(--acc2);}
.chat{flex:1;overflow-y:auto;padding:16px 13px;display:flex;flex-direction:column;gap:11px;scroll-behavior:smooth;}
.chat::-webkit-scrollbar{width:3px;}.chat::-webkit-scrollbar-thumb{background:var(--bor);border-radius:2px;}
.msg{display:flex;gap:8px;align-items:flex-end;animation:fu .2s ease;}
@keyframes fu{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.msg.u{flex-direction:row-reverse;}
.av2{width:25px;height:25px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;}
.msg.ai .av2{background:linear-gradient(135deg,var(--acc),var(--acc2));color:#fff;}
.msg.u .av2{background:var(--bor);color:var(--lab);}
.bbl{max-width:80%;padding:9px 13px;border-radius:14px;font-size:13px;line-height:1.65;}
.msg.ai .bbl{background:var(--ai);border:1px solid var(--bor);border-bottom-left-radius:3px;}
.msg.u .bbl{background:var(--us);border-bottom-right-radius:3px;color:#c8dcff;}
.typ{display:flex;gap:4px;align-items:center;padding:10px 13px;background:var(--ai);border:1px solid var(--bor);border-radius:14px;border-bottom-left-radius:3px;}
.dt{width:6px;height:6px;background:var(--mut);border-radius:50%;animation:b 1.2s infinite;}
.dt:nth-child(2){animation-delay:.2s}.dt:nth-child(3){animation-delay:.4s}
@keyframes b{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-4px);opacity:1}}
.chips{display:flex;flex-wrap:wrap;gap:6px;padding:2px 0 3px 33px;animation:fu .28s ease .1s both;}
.chip{background:var(--sur2);border:1px solid var(--bor);border-radius:16px;padding:5px 12px;font-size:12px;color:var(--lab);cursor:pointer;transition:all .13s;white-space:nowrap;}
.chip:hover{border-color:var(--acc);color:var(--acc);background:rgba(79,142,247,.08);}
.rec{background:linear-gradient(135deg,var(--sur2),#0f1628);border:1px solid var(--acc);border-radius:12px;padding:15px;max-width:82%;}
.rec-b{display:inline-flex;align-items:center;gap:4px;background:rgba(79,142,247,.12);border:1px solid rgba(79,142,247,.25);border-radius:16px;padding:3px 10px;font-size:10px;font-weight:700;color:var(--acc);text-transform:uppercase;letter-spacing:.07em;margin-bottom:9px;}
.rec-t{font-size:16px;font-weight:700;margin-bottom:4px;}
.rec-d{font-size:12px;color:var(--lab);line-height:1.6;margin-bottom:11px;}
.rec-s{display:flex;flex-direction:column;gap:5px;margin-bottom:12px;}
.rec-si{display:flex;align-items:center;gap:6px;font-size:12px;}
.rec-si::before{content:'✓';width:16px;height:16px;background:rgba(0,212,170,.12);border:1px solid rgba(0,212,170,.3);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--acc2);flex-shrink:0;}
.rec-p{font-size:11px;color:var(--mut);border-top:1px solid var(--bor);padding-top:8px;margin-bottom:12px;}
.rec-p strong{color:var(--acc2);font-size:13px;}
.btn-c{width:100%;background:linear-gradient(135deg,var(--acc),var(--acc2));border:none;border-radius:7px;padding:10px;font-size:13px;font-weight:600;color:#fff;cursor:pointer;transition:opacity .13s;}
.btn-c:hover{opacity:.88;}
.frm{background:var(--sur2);border:1px solid var(--bor);border-radius:12px;padding:15px;max-width:82%;display:flex;flex-direction:column;gap:8px;}
.frm-t{font-size:13px;font-weight:600;margin-bottom:2px;}
.frm input,.frm select{background:var(--bg);border:1px solid var(--bor);border-radius:7px;padding:8px 11px;font-size:13px;color:var(--txt);font-family:'Inter',sans-serif;outline:none;transition:border-color .13s;width:100%;}
.frm input:focus,.frm select:focus{border-color:var(--acc);}
.frm input::placeholder{color:var(--mut);}
.frm select option{background:var(--sur2);}
.btn-s{background:linear-gradient(135deg,var(--acc),var(--acc2));border:none;border-radius:7px;padding:10px;font-size:13px;font-weight:600;color:#fff;cursor:pointer;}
.frm-n{font-size:10px;color:var(--mut);text-align:center;}
.inp-row{flex-shrink:0;background:var(--sur);border-top:1px solid var(--bor);padding:10px 13px;display:flex;gap:7px;align-items:center;}
.inp-row textarea{flex:1;background:var(--sur2);border:1px solid var(--bor);border-radius:8px;padding:8px 12px;font-size:13px;color:var(--txt);font-family:'Inter',sans-serif;resize:none;outline:none;max-height:85px;line-height:1.5;transition:border-color .13s;}
.inp-row textarea:focus{border-color:var(--acc);}
.inp-row textarea::placeholder{color:var(--mut);}
.btn-send{width:34px;height:34px;background:linear-gradient(135deg,var(--acc),var(--acc2));border:none;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.btn-send svg{width:14px;height:14px;fill:#fff;}
</style>
</head>
<body>

<div class="top">
  <div class="av">N</div>
  <div>
    <div class="bn">Neo · 360 Ergometric Tests</div>
    <div class="br">Σύμβουλος Αθλητικής Επιστήμης</div>
  </div>
  <div class="pw">Powered by <b>AI</b></div>
</div>

<div class="chat" id="chat"></div>

<div class="inp-row">
  <textarea id="inp" placeholder="Γράψε μήνυμα..." rows="1"
    onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send()}"
    oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"></textarea>
  <button class="btn-send" onclick="send()">
    <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
  </button>
</div>

<script>
var API = "https://orange-bread-f8b1.neoph-ioannou.workers.dev";
var SESSION_ID = 'sid_' + Date.now() + '_' + Math.random().toString(36).substr(2,9);
var isBusy = false;

window.onload = function() {
  setTimeout(function() {
    showTyping(function() {
      addAI("Γεια σου! 👋 Είμαι ο Neo, σύμβουλος του 360 Ergometric Tests.\n\nΠες μου λίγα λόγια για σένα — είσαι αθλητής, ενδιαφέρεσαι για κάποιο τεστ προσωπικά, ή εκπροσωπείς μια ομάδα ή σύλλογο;");
      addChips(["Είμαι αθλητής", "Ενδιαφέρομαι ως ιδιώτης", "Εκπροσωπώ σύλλογο / ακαδημία", "Είμαι γονιός αθλητή"]);
    });
  }, 500);
};

function send(txt) {
  if (isBusy) return;
  var inp = document.getElementById("inp");
  var msg = (txt || inp.value).trim();
  if (!msg) return;
  inp.value = ""; inp.style.height = "auto";
  removeChips();
  addUser(msg);
  isBusy = true;

  showTyping(function() {
    fetch(API, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ type: "chat", sessionId: SESSION_ID, message: msg })
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      removeTyping();
      isBusy = false;
      if (!data.success) {
        addAI("Συγγνώμη, προέκυψε τεχνικό πρόβλημα. Παρακαλώ επικοινώνησε στο **+357 99341202**.");
        return;
      }
      var full = data.reply;
      var match = full.match(/RECOMMENDATION_JSON:(\{[\s\S]+?\})\s*$/m);
      if (match) {
        var t = full.replace(/RECOMMENDATION_JSON:[\s\S]+$/, "").trim();
        if (t) addAI(t);
        try { showRec(JSON.parse(match[1])); } catch(e) { addAI(full); }
      } else {
        addAI(full);
      }
    })
    .catch(function() {
      removeTyping();
      isBusy = false;
      addAI("Δεν μπόρεσα να συνδεθώ. Παρακαλώ επικοινώνησε στο **+357 99341202**.");
    });
  });
}

function addUser(text) {
  var c = document.getElementById("chat");
  var el = document.createElement("div");
  el.className = "msg u";
  el.innerHTML = '<div class="av2">Εσύ</div><div class="bbl">' + esc(text) + '</div>';
  c.appendChild(el); scroll();
}

function addAI(text) {
  var c = document.getElementById("chat");
  var el = document.createElement("div");
  el.className = "msg ai";
  el.innerHTML = '<div class="av2">N</div><div class="bbl">' + fmt(text) + '</div>';
  c.appendChild(el); scroll();
}

function showTyping(cb) {
  var c = document.getElementById("chat");
  var el = document.createElement("div");
  el.className = "msg ai"; el.id = "typ";
  el.innerHTML = '<div class="av2">N</div><div class="typ"><div class="dt"></div><div class="dt"></div><div class="dt"></div></div>';
  c.appendChild(el); scroll();
  setTimeout(cb, 400);
}

function removeTyping() {
  var t = document.getElementById("typ"); if (t) t.remove();
}

function addChips(opts) {
  removeChips();
  var c = document.getElementById("chat");
  var w = document.createElement("div");
  w.className = "chips"; w.id = "chips";
  opts.forEach(function(o) {
    var chip = document.createElement("div");
    chip.className = "chip"; chip.textContent = o;
    chip.onclick = function() { send(o); };
    w.appendChild(chip);
  });
  c.appendChild(w); scroll();
}

function removeChips() {
  var ch = document.getElementById("chips"); if (ch) ch.remove();
}

function showRec(rec) {
  var c = document.getElementById("chat");
  var el = document.createElement("div");
  el.className = "msg ai";
  var svcs = (rec.services||[]).map(function(s){ return '<div class="rec-si">'+esc(s)+'</div>'; }).join("");
  var pkgS = esc(rec.package||"").replace(/'/g,"\\'");
  el.innerHTML =
    '<div class="av2">N</div><div class="rec">' +
    '<div class="rec-b">⭐ Προτεινόμενο Πακέτο</div>' +
    '<div class="rec-t">'+esc(rec.package)+'</div>' +
    '<div class="rec-d">'+esc(rec.description)+'</div>' +
    '<div class="rec-s">'+svcs+'</div>' +
    '<div class="rec-p">Ενδεικτική τιμή: <strong>'+esc(rec.price)+'</strong></div>' +
    '<button class="btn-c" onclick="showForm(\''+pkgS+'\','+(!!(rec.isB2B))+')">📅 '+esc(rec.cta||"Κλείσε Ραντεβού")+'</button>' +
    '</div>';
  c.appendChild(el);
  setTimeout(function(){
    addAI("Θέλεις να σου εξηγήσω περισσότερα; Ή κλείνουμε άμεσα ραντεβού; 😊");
    addChips(["Πες μου περισσότερα","Κλείσε ραντεβού","Τι κοστίζει ακριβώς;","Πού βρίσκεστε;"]);
  },300);
  scroll();
}

function showForm(pkg, isB2B) {
  removeChips();
  setTimeout(function(){ addAI("Τέλεια! Άφησέ μου τα στοιχεία σου και θα επικοινωνήσω μαζί σου εντός της ίδιας μέρας. 📞"); },150);
  setTimeout(function(){
    var c = document.getElementById("chat");
    var el = document.createElement("div");
    el.className = "msg ai";
    var b2b = isB2B ?
      '<input type="text" id="cf-club" placeholder="Όνομα Συλλόγου / Ακαδημίας">'+
      '<input type="number" id="cf-players" placeholder="Αριθμός αθλητών" min="1">' : "";
    el.innerHTML =
      '<div class="av2">N</div><div class="frm">' +
      '<div class="frm-t">📋 Στοιχεία Επικοινωνίας</div>' +
      '<input type="text" id="cf-name" placeholder="Ονοματεπώνυμο *">' +
      '<input type="tel" id="cf-phone" placeholder="Τηλέφωνο *">' +
      '<input type="email" id="cf-email" placeholder="Email">' +
      b2b +
      '<select id="cf-time"><option value="">Προτιμώμενη ώρα επικοινωνίας</option>' +
      '<option>Πρωί (9:00–12:00)</option><option>Μεσημέρι (12:00–15:00)</option><option>Απόγευμα (15:00–18:00)</option></select>' +
      '<input type="hidden" id="cf-pkg" value="'+esc(pkg)+'">' +
      '<button class="btn-s" onclick="submitForm('+isB2B+')">Αποστολή →</button>' +
      '<div class="frm-n">🔒 Τα στοιχεία σου είναι ασφαλή</div></div>';
    c.appendChild(el); scroll();
  },1000);
}

function submitForm(isB2B) {
  var name    = ((document.getElementById("cf-name")||{}).value||"").trim();
  var phone   = ((document.getElementById("cf-phone")||{}).value||"").trim();
  var email   = (document.getElementById("cf-email")||{}).value||"";
  var pkg     = (document.getElementById("cf-pkg")||{}).value||"";
  var time    = (document.getElementById("cf-time")||{}).value||"";
  var club    = ((document.getElementById("cf-club")||{}).value||"").trim();
  var players = (document.getElementById("cf-players")||{}).value||"";

  if (!name||!phone){ alert("Παρακαλώ συμπλήρωσε τουλάχιστον το όνομα και το τηλέφωνό σου."); return; }

  // Στέλνουμε lead στο Cloudflare Worker
  fetch(API, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ type: "lead", name:name, phone:phone, email:email, pkg:pkg, time:time, club:club, players:players })
  }).catch(function(){});

  // Στέλνουμε και στο Apps Script για email notification
  var appsScript = "https://script.google.com/macros/s/AKfycbws0o7jVqy3FM9U2-lr4KgCDP6ZwQ5t86sjPN-EGn4YmL0wmJTmSSd9QpJMKsuHFt_f8w/exec";
  var url = appsScript + "?type=lead&name="+encodeURIComponent(name)+"&phone="+encodeURIComponent(phone)+"&email="+encodeURIComponent(email)+"&pkg="+encodeURIComponent(pkg)+"&time="+encodeURIComponent(time)+"&club="+encodeURIComponent(club)+"&players="+encodeURIComponent(players);
  fetch(url).catch(function(){});

  document.querySelectorAll(".frm").forEach(function(f){ var p=f.closest(".msg"); if(p) p.remove(); });
  addAI("Τέλεια "+name.split(" ")[0]+"! ✅ Έλαβα τα στοιχεία σου.\n\nΘα επικοινωνήσω μαζί σου "+(time?time.toLowerCase():"σύντομα")+".\n\nΑν θέλεις να μιλήσεις άμεσα: **+357 99341202** 💪");
  scroll();
}

function esc(s){ return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function fmt(t){ return esc(t).replace(/\*\*(.+?)\*\*/g,"<strong>$1</strong>").replace(/\n/g,"<br>"); }
function scroll(){ var c=document.getElementById("chat"); setTimeout(function(){ c.scrollTop=c.scrollHeight; },40); }
</script>
</body>
</html>
